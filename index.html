<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Подключаем необходимые React, ReactDOM, Babel и Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // Активируем поддержку переключения темных классов в Tailwind CSS CDN
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(12px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        /* Кастомный скроллбар для десктопа */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Безопасное хранилище (предотвращает краш в iframe без доступа к localStorage)
        const safeStorage = {
            getItem: (key) => {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    return null;
                }
            },
            setItem: (key, value) => {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    // Игнорируем ошибки квоты или безопасности в песочнице
                }
            }
        };

        // Вспомогательная функция извлечения данных
        const getInitialData = (key, defaultValue) => {
            const saved = safeStorage.getItem(key);
            try { 
                if (!saved) return defaultValue;
                const parsed = JSON.parse(saved);
                // Валидация типов для защиты от поврежденного JSON
                if (Array.isArray(defaultValue) && !Array.isArray(parsed)) {
                    return defaultValue;
                }
                return parsed;
            } catch (e) { 
                return defaultValue; 
            }
        };

        // Компонент иконок
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const icons = {
                home: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

                    </svg>
                ),
                calendar: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>

                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                ),
                'file-text': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>

                    </svg>

                zap: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                ),
                'check-circle-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>

                        <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/>

                ),
                'edit-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                    </svg>
                ),
                check: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                ),
                plus: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                ),
                x: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                ),
                sun: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                ),
                moon: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                ),
                dollar: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                ),
                mapPin: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                ),
                clock: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                )
            };
            return icons[name] || (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} className={className} style={{ width: size, height: size }}>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditingName, setIsEditingName] = useState(false);
            const fileInputRef = useRef(null);
            
            // Состояния управления категориями вещей
            const [editingCatIndex, setEditingCatIndex] = useState(null);
            const [editingCatText, setEditingCatText] = useState('');
            const [isAddingNewCat, setIsAddingNewCat] = useState(false);
            const [newCatName, setNewCatName] = useState('');

            // Состояния управления категориями заметок
            const [editingNoteCatIndex, setEditingNoteCatIndex] = useState(null);
            const [editingNoteCatText, setEditingNoteCatText] = useState('');
            const [isAddingNewNoteCat, setIsAddingNewNoteCat] = useState(false);
            const [newNoteCatName, setNewNoteCatName] = useState('');

            // Состояния управления категориями бюджета
            const [editingBudgetCatIndex, setEditingBudgetCatIndex] = useState(null);
            const [editingBudgetCatText, setEditingBudgetCatText] = useState('');
            const [isAddingNewBudgetCat, setIsAddingNewBudgetCat] = useState(false);
            const [newBudgetCatName, setNewBudgetCatName] = useState('');

            // Быстрое добавление категорий внутри Модального окна
            const [isCreatingNoteCatInModal, setIsCreatingNoteCatInModal] = useState(false);
            const [newNoteCatInModal, setNewNoteCatInModal] = useState('');

            const [isCreatingBudgetCatInModal, setIsCreatingBudgetCatInModal] = useState(false);
            const [newBudgetCatInModal, setNewBudgetCatInModal] = useState('');

            const [isCreatingPackingCatInModal, setIsCreatingPackingCatInModal] = useState(false);
            const [newPackingCatInModal, setNewPackingCatInModal] = useState('');

            // Состояние редактирования сущности (для изменения тасков/вещей/заметок/бюджета)
            const [editingEntity, setEditingEntity] = useState(null);

            // Под-вкладка для детального планирования
            const [infoSubTab, setInfoSubTab] = useState('notes'); // notes, itinerary, budget

            // Тёмная тема
            const [darkMode, setDarkMode] = useState(() => {
                const saved = safeStorage.getItem('vacation_theme');
                return saved === 'dark';
            });

            // Кастомная система диалогов (вместо alert и confirm)
            const [customDialog, setCustomDialog] = useState({
                isOpen: false,
                title: '',
                message: '',
                isConfirm: false,
                onConfirm: null
            });

            const [tripName, setTripName] = useState(() => safeStorage.getItem('tripName') || 'Лазурный берег');
            const [tripDate, setTripDate] = useState(() => safeStorage.getItem('tripDate') || '');
            
            // Динамические категории (Загрузка из LocalStorage с дефолтами)
            const [packingCategories, setPackingCategories] = useState(() => getInitialData('packingCategories_v3', [
                'Мои вещи', 'Вещи супруга', 'Детские', 'Аптечка', 'Разное'
            ]));

            const [noteCategories, setNoteCategories] = useState(() => getInitialData('noteCategories_v1', [
                'Адреса', 'Покупки', 'Места', 'Важное'
            ]));

            const [budgetCategories, setBudgetCategories] = useState(() => getInitialData('budgetCategories_v1', [
                'Транспорт', 'Жилье', 'Развлечения', 'Питание', 'Другое'
            ]));

            // Выбор категории по умолчанию
            const [activePackingCat, setActivePackingCat] = useState(() => {
                const cats = getInitialData('packingCategories_v3', ['Мои вещи']);
                return cats[0] || 'Мои вещи';
            });
            const [selectedCategory, setSelectedCategory] = useState(() => {
                const cats = getInitialData('noteCategories_v1', ['Адреса']);
                return cats[0] || 'Адреса';
            });
            const [newBudgetCause, setNewBudgetCause] = useState(() => {
                const cats = getInitialData('budgetCategories_v1', ['Транспорт']);
                return cats[0] || 'Транспорт';
            });

            // Форма добавления нового элемента
            const [newItemName, setNewItemName] = useState(''); 
            const [newItemContent, setNewItemContent] = useState(''); 
            const [selectedTime, setSelectedTime] = useState('В планах');
            
            // Специфичные поля для новых типов данных
            const [newItineraryTime, setNewItineraryTime] = useState('10:00');
            const [newItineraryDay, setNewItineraryDay] = useState('День 1');
            
            // Состояния мультивалютности
            const [newBudgetCost, setNewBudgetCost] = useState('');
            const [newBudgetCurrency, setNewBudgetCurrency] = useState('₽');
            const [displayCurrency, setDisplayCurrency] = useState(() => safeStorage.getItem('displayCurrency') || '₽');
            const [isRatesOpen, setIsRatesOpen] = useState(false);
            const [exchangeRates, setExchangeRates] = useState(() => getInitialData('exchangeRates_v1', {
                '₽': 1,
                '$': 90,
                '€': 98,
                '¥': 12.5
            }));

            const [tasks, setTasks] = useState(() => getInitialData('tasks', [
                { id: 1, title: 'Проверить сроки паспортов', time: 'За 30 дней', completed: true },
                { id: 2, title: 'Забронировать трансфер', time: 'За 14 дней', completed: false }
            ]));

            const [packingList, setPackingList] = useState(() => getInitialData('packingList_v3', [
                { id: 101, item: 'Купальник / Плавки', cat: 'Мои вещи', checked: false },
                { id: 102, item: 'Солнцезащитные очки', cat: 'Вещи супруга', checked: true },
                { id: 103, item: 'Игрушечный поезд', cat: 'Детские', checked: false },
                { id: 104, item: 'Пластырь и SPF крем', cat: 'Аптечка', checked: false }
            ]));

            const [notes, setNotes] = useState(() => getInitialData('notes_v2', [
                { id: 901, title: 'Отель Riviera', content: 'ул. Набережная, 15. Код от ворот 1234', category: 'Адреса' }
            ]));

            const [itinerary, setItinerary] = useState(() => getInitialData('itinerary_v1', [
                { id: 801, day: 'День 1', time: '12:00', title: 'Прилет и заселение', content: 'Встречаемся у стойки регистрации' },
                { id: 802, day: 'День 1', time: '18:00', title: 'Ужин в порту', content: 'Рыбный ресторан с видом на закат' }
            ]));

            const [budget, setBudget] = useState(() => getInitialData('budget_v2', [
                { id: 701, title: 'Авиабилеты', cost: 12000, currency: '₽', category: 'Транспорт' },
                { id: 702, title: 'Отель Riviera', cost: 250, currency: '$', category: 'Жилье' },
                { id: 703, title: 'Ужин в ресторане', cost: 65, currency: '€', category: 'Питание' }
            ]));

            const [lastMinute, setLastMinute] = useState(() => getInitialData('lastMinute', [
                { id: 1, title: 'Утюг выключен', checked: false },
                { id: 2, title: 'Окна закрыты', checked: false },
                { id: 3, title: 'Вода перекрыта', checked: false },
                { id: 4, title: 'Мусор вынесен', checked: false }
            ]));

            useEffect(() => {
                safeStorage.setItem('tripName', tripName);
                safeStorage.setItem('tripDate', tripDate);
                safeStorage.setItem('packingCategories_v3', JSON.stringify(packingCategories));
                safeStorage.setItem('noteCategories_v1', JSON.stringify(noteCategories));
                safeStorage.setItem('budgetCategories_v1', JSON.stringify(budgetCategories));
                safeStorage.setItem('tasks', JSON.stringify(tasks));
                safeStorage.setItem('packingList_v3', JSON.stringify(packingList));
                safeStorage.setItem('notes_v2', JSON.stringify(notes));
                safeStorage.setItem('itinerary_v1', JSON.stringify(itinerary));
                safeStorage.setItem('budget_v2', JSON.stringify(budget));
                safeStorage.setItem('lastMinute', JSON.stringify(lastMinute));
                safeStorage.setItem('displayCurrency', displayCurrency);
                safeStorage.setItem('exchangeRates_v1', JSON.stringify(exchangeRates));
            }, [tripName, tripDate, packingCategories, noteCategories, budgetCategories, tasks, packingList, notes, itinerary, budget, lastMinute, displayCurrency, exchangeRates]);

            // Синхронизация тёмной темы в DOM
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    safeStorage.setItem('vacation_theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    safeStorage.setItem('vacation_theme', 'light');
                }
            }, [darkMode]);

            const timePeriods = ['В планах', 'За 30 дней', 'За 14 дней', 'За 7 дней', '24 часа'];

            const triggerAlert = (title, message) => {
                setCustomDialog({
                    isOpen: true,
                    title,
                    message,
                    isConfirm: false,
                    onConfirm: null
                });
            };

            const triggerConfirm = (title, message, callback) => {
                setCustomDialog({
                    isOpen: true,
                    title,
                    message,
                    isConfirm: true,
                    onConfirm: () => {
                        callback();
                        closeDialog();
                    }
                });
            };

            const closeDialog = () => {
                setCustomDialog(prev => ({ ...prev, isOpen: false }));
            };

            const formatDate = (dateString) => {
                if (!dateString) return "";
                try {
                    const dateObj = new Date(dateString);
                    if (isNaN(dateObj.getTime())) return "";
                    return dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
                } catch (e) {
                    return dateString;
                }
            };

            const getDaysLeft = () => {
                if (!tripDate) return 14; 
                try {
                    const dateObj = new Date(tripDate);
                    if (isNaN(dateObj.getTime())) return 14;
                    const diff = dateObj.getTime() - new Date().getTime();
                    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                } catch (e) {
                    return 14;
                }
            };

            // Конвертация валют
            const convertCurrency = (amount, from, to) => {
                const amountNum = Number(amount) || 0;
                if (!from) from = '₽';
                if (!to) to = '₽';
                if (from === to) return amountNum;
                
                const rates = exchangeRates || { '₽': 1, '$': 90, '€': 98, '¥': 12.5 };
                // Конвертируем в базовую валюту (Рубли)
                const inRub = amountNum * (rates[from] || 1);
                // Переводим в целевую валюту
                return inRub / (rates[to] || 1);
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newItemName.trim()) return;
                const id = Date.now();
                
                if (activeTab === 'tasks') {
                    setTasks([{ id, title: newItemName, time: selectedTime, completed: false }, ...tasks]);
                } else if (activeTab === 'packing') {
                    setPackingList([{ id, item: newItemName, cat: activePackingCat, checked: false }, ...packingList]);
                } else if (activeTab === 'notes') {
                    if (infoSubTab === 'notes') {
                        setNotes([{ id, title: newItemName, content: newItemContent, category: selectedCategory }, ...notes]);
                    } else if (infoSubTab === 'itinerary') {
                        setItinerary([{ id, day: newItineraryDay, time: newItineraryTime, title: newItemName, content: newItemContent }, ...itinerary]);
                    } else if (infoSubTab === 'budget') {
                        const parsedCost = parseFloat(newBudgetCost) || 0;
                        setBudget([{ id, title: newItemName, cost: parsedCost, currency: newBudgetCurrency, category: newBudgetCause }, ...budget]);
                        setNewBudgetCost('');
                        setNewBudgetCurrency('₽');
                    }
                }
                
                setNewItemName('');
                setNewItemContent('');
                setIsModalOpen(false);
            };

            const deleteItem = (type, id) => {
                if (type === 'notes') setNotes(notes.filter(n => n.id !== id));
                if (type === 'tasks') setTasks(tasks.filter(t => t.id !== id));
                if (type === 'packing') setPackingList(packingList.filter(p => p.id !== id));
                if (type === 'itinerary') setItinerary(itinerary.filter(i => i.id !== id));
                if (type === 'budget') setBudget(budget.filter(b => b.id !== id));
            };

            const startEditing = (type, item) => {
                setEditingEntity({ type, data: { ...item } });
            };

            const saveEditedEntity = (e) => {
                e.preventDefault();
                if (!editingEntity) return;
                const { type, data } = editingEntity;
                if (!data.title && !data.item) return;

                if (type === 'tasks') {
                    setTasks(tasks.map(t => t.id === data.id ? data : t));
                } else if (type === 'packing') {
                    setPackingList(packingList.map(p => p.id === data.id ? { ...p, item: data.item, cat: data.cat } : p));
                } else if (type === 'notes') {
                    setNotes(notes.map(n => n.id === data.id ? data : n));
                } else if (type === 'itinerary') {
                    setItinerary(itinerary.map(i => i.id === data.id ? data : i));
                } else if (type === 'budget') {
                    setBudget(budget.map(b => b.id === data.id ? { 
                        ...b, 
                        title: data.title, 
                        cost: parseFloat(data.cost) || 0, 
                        currency: data.currency || '₽',
                        category: data.category 
                    } : b));
                }

                setEditingEntity(null);
            };

            const handleAddNewCategory = (e) => {
                if(e) e.preventDefault();
                const name = newCatName.trim();
                if (!name) return;
                if (packingCategories.includes(name)) {
                    triggerAlert("Внимание", "Раздел с таким названием уже существует!");
                    return;
                }
                const updatedCats = [...packingCategories, name];
                setPackingCategories(updatedCats);
                setActivePackingCat(name);
                setNewCatName('');
                setIsAddingNewCat(false);
            };

            const handleDeleteCategory = (catToDelete) => {
                if (packingCategories.length <= 1) {
                    triggerAlert("Внимание", "Должен остаться хотя бы один список вещей!");
                    return;
                }
                triggerConfirm(
                    "Удаление раздела вещей", 
                    `Вы действительно хотите удалить раздел «${catToDelete}» и все вещи в нём?`,
                    () => {
                        const updatedCats = packingCategories.filter(c => c !== catToDelete);
                        setPackingCategories(updatedCats);
                        setPackingList(packingList.filter(p => p.cat !== catToDelete));
                        if (activePackingCat === catToDelete) {
                            setActivePackingCat(updatedCats[0]);
                        }
                    }
                );
            };

            const handleRenameCategory = (index) => {
                if (!editingCatText.trim()) return;
                const oldName = packingCategories[index];
                const newName = editingCatText.trim();
                
                if (packingCategories.includes(newName) && oldName !== newName) {
                    triggerAlert("Внимание", "Раздел с таким названием уже существует!");
                    return;
                }
                
                const updatedCats = [...packingCategories];
                updatedCats[index] = newName;
                setPackingCategories(updatedCats);
                
                setPackingList(packingList.map(p => p.cat === oldName ? { ...p, cat: newName } : p));
                if (activePackingCat === oldName) setActivePackingCat(newName);
                setEditingCatIndex(null);
            };

            const handleAddNewNoteCategory = (e) => {
                if(e) e.preventDefault();
                const name = newNoteCatName.trim();
                if (!name) return;
                if (noteCategories.includes(name)) {
                    triggerAlert("Внимание", "Раздел заметок с таким названием уже существует!");
                    return;
                }
                const updated = [...noteCategories, name];
                setNoteCategories(updated);
                setSelectedCategory(name);
                setNewNoteCatName('');
                setIsAddingNewNoteCat(false);
            };

            const handleDeleteNoteCategory = (catToDelete) => {
                if (noteCategories.length <= 1) {
                    triggerAlert("Внимание", "Должна остаться хотя бы одна категория заметок!");
                    return;
                }
                triggerConfirm(
                    "Удаление категории заметок", 
                    `Вы действительно хотите удалить категорию «${catToDelete}» и все связанные с ней заметки?`,
                    () => {
                        const updated = noteCategories.filter(c => c !== catToDelete);
                        setNoteCategories(updated);
                        setNotes(notes.filter(n => n.category !== catToDelete));
                        if (selectedCategory === catToDelete) {
                            setSelectedCategory(updated[0]);
                        }
                    }
                );
            };

            const handleRenameNoteCategory = (index) => {
                if (!editingNoteCatText.trim()) return;
                const oldName = noteCategories[index];
                const newName = editingNoteCatText.trim();

                if (noteCategories.includes(newName) && oldName !== newName) {
                    triggerAlert("Внимание", "Раздел заметок с таким названием уже существует!");
                    return;
                }

                const updated = [...noteCategories];
                updated[index] = newName;
                setNoteCategories(updated);

                setNotes(notes.map(n => n.category === oldName ? { ...n, category: newName } : n));
                if (selectedCategory === oldName) setSelectedCategory(newName);
                setEditingNoteCatIndex(null);
            };

            const handleAddNewBudgetCategory = (e) => {
                if(e) e.preventDefault();
                const name = newBudgetCatName.trim();
                if (!name) return;
                if (budgetCategories.includes(name)) {
                    triggerAlert("Внимание", "Раздел расходов с таким названием уже существует!");
                    return;
                }
                const updated = [...budgetCategories, name];
                setBudgetCategories(updated);
                setNewBudgetCause(name);
                setNewBudgetCatName('');
                setIsAddingNewBudgetCat(false);
            };

            const handleDeleteBudgetCategory = (catToDelete) => {
                if (budgetCategories.length <= 1) {
                    triggerAlert("Внимание", "Должна остаться хотя бы одна категория расходов!");
                    return;
                }
                triggerConfirm(
                    "Удаление категории расходов", 
                    `Вы действительно хотите удалить категорию «${catToDelete}» и все записанные траты в ней?`,
                    () => {
                        const updated = budgetCategories.filter(c => c !== catToDelete);
                        setBudgetCategories(updated);
                        setBudget(budget.filter(b => b.category !== catToDelete));
                        if (newBudgetCause === catToDelete) {
                            setNewBudgetCause(updated[0]);
                        }
                    }
                );
            };

            const handleRenameBudgetCategory = (index) => {
                if (!editingBudgetCatText.trim()) return;
                const oldName = budgetCategories[index];
                const newName = editingBudgetCatText.trim();

                if (budgetCategories.includes(newName) && oldName !== newName) {
                    triggerAlert("Внимание", "Раздел расходов с таким названием уже существует!");
                    return;
                }

                const updated = [...budgetCategories];
                updated[index] = newName;
                setBudgetCategories(updated);

                setBudget(budget.map(b => b.category === oldName ? { ...b, category: newName } : b));
                if (newBudgetCause === oldName) setNewBudgetCause(newName);
                setEditingBudgetCatIndex(null);
            };

            const exportData = () => {
                try {
                    const data = { 
                        tripName, tripDate, packingCategories, noteCategories, budgetCategories, 
                        tasks, packingList, notes, itinerary, budget, lastMinute,
                        displayCurrency, exchangeRates 
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `plan-${tripName || 'vacation'}.json`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    triggerAlert("Ошибка", "Не удалось экспортировать данные: " + err.message);
                }
            };

            const importData = (e) => {
                const file = e.target.files ? e.target.files[0] : null;
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result || "{}");
                        if (data.tripName) setTripName(data.tripName);
                        if (data.tripDate) setTripDate(data.tripDate);
                        if (data.packingCategories) setPackingCategories(data.packingCategories);
                        if (data.noteCategories) setNoteCategories(data.noteCategories);
                        if (data.budgetCategories) setBudgetCategories(data.budgetCategories);
                        if (data.tasks) setTasks(data.tasks);
                        if (data.packingList) setPackingList(data.packingList);
                        if (data.notes) setNotes(data.notes);
                        if (data.itinerary) setItinerary(data.itinerary);
                        if (data.budget) setBudget(data.budget);
                        if (data.lastMinute) setLastMinute(data.lastMinute);
                        if (data.displayCurrency) setDisplayCurrency(data.displayCurrency);
                        if (data.exchangeRates) setExchangeRates(data.exchangeRates);
                        
                        if (data.packingCategories && data.packingCategories.length > 0) {
                            setActivePackingCat(data.packingCategories[0]);
                        }
                        if (data.noteCategories && data.noteCategories.length > 0) {
                            setSelectedCategory(data.noteCategories[0]);
                        }
                        if (data.budgetCategories && data.budgetCategories.length > 0) {
                            setNewBudgetCause(data.budgetCategories[0]);
                        }
                        triggerAlert("Успешно", "🎉 Все данные плана были успешно загружены!");
                    } catch (err) { 
                        triggerAlert("Ошибка чтения файла", err.message); 
                    } finally {
                        e.target.value = '';
                    }
                };
                reader.readAsText(file);
            };

            const clearAllData = () => {
                triggerConfirm(
                    "Очистка данных",
                    "Вы уверены, что хотите удалить текущий план и вернуть всё к начальным настройкам?",
                    () => {
                        setTripName('Новое путешествие');
                        setTripDate('');
                        setTasks([]);
                        setPackingList([]);
                        setNotes([]);
                        setItinerary([]);
                        setBudget([]);
                        setPackingCategories(['Мои вещи', 'Вещи супруга', 'Детские', 'Аптечка', 'Разное']);
                        setNoteCategories(['Адреса', 'Покупки', 'Места', 'Важное']);
                        setBudgetCategories(['Транспорт', 'Жилье', 'Развлечения', 'Питание', 'Другое']);
                        setActivePackingCat('Мои вещи');
                        setSelectedCategory('Адреса');
                        setNewBudgetCause('Транспорт');
                        setDisplayCurrency('₽');
                        setExchangeRates({ '₽': 1, '$': 90, '€': 98, '¥': 12.5 });
                    }
                );
            };

            const progress = Math.round((tasks.filter(t => t.completed).length / (tasks.length || 1)) * 100);
            
            // Расчет суммарного бюджета с конвертацией всех расходов в целевую валюту
            const totalBudgetSpent = budget.reduce((sum, item) => {
                const cost = Number(item.cost) || 0;
                const currency = item.currency || '₽';
                return sum + convertCurrency(cost, currency, displayCurrency);
            }, 0);

            const navigationItems = [
                {id:'home', icon:'home', label:'Старт'}, 
                {id:'tasks', icon:'calendar', label:'План задач'}, 
                {id:'packing', icon:'briefcase', label:'Вещи в дорогу'}, 
                {id:'notes', icon:'file-text', label:'Поездка детально'}
            ];

            return (
                <div className="min-h-screen w-full flex flex-col md:flex-row bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
                    
                    {/* Левая панель навигации для десктопа / Верхняя шапка для мобильных */}
                    <div className="w-full md:w-80 bg-slate-900 text-white flex flex-col justify-between p-6 md:h-screen md:sticky md:top-0 shadow-xl z-20 dark:bg-slate-900/60 dark:backdrop-blur-md">
                        <div className="space-y-6">
                            
                            {/* Заголовок поездки и переключатель темы */}
                            <div className="pt-4 space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Планировщик</span>
                                    <button 
                                        onClick={() => setDarkMode(!darkMode)}
                                        className="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all text-yellow-400 dark:text-indigo-400"
                                        title={darkMode ? "Светлая тема" : "Тёмная тема"}
                                    >
                                        <Icon name={darkMode ? "sun" : "moon"} size={18} />
                                    </button>
                                </div>
                                
                                {isEditingName ? (
                                    <div className="space-y-3 bg-slate-800 p-4 rounded-2xl animate-in border border-slate-700">
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Название поездки</label>
                                            <input 
                                                type="text"
                                                className="text-sm font-bold border border-slate-700 rounded-lg px-2.5 py-1.5 outline-none w-full bg-slate-900 text-white focus:border-blue-500" 
                                                value={tripName} 
                                                onChange={e => setTripName(e.target.value)} 
                                                onKeyDown={e => e.key === 'Enter' && setIsEditingName(false)}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Дата выезда</label>
                                            <input 
                                                type="date" 
                                                className="text-xs bg-slate-900 border border-slate-700 p-2 rounded-lg outline-none text-white w-full cursor-pointer focus:border-blue-500" 
                                                value={tripDate} 
                                                onChange={e => setTripDate(e.target.value)} 
                                            />
                                        </div>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setIsEditingName(false); }}
                                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg text-xs transition-colors flex items-center justify-center gap-1"
                                        >
                                            <Icon name="check" size={12} /> Сохранить
                                        </button>
                                    </div>
                                ) : (
                                    <div className="cursor-pointer group bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 hover:bg-slate-800/80 transition-all" onClick={() => setIsEditingName(true)}>
                                        <div className="flex items-center justify-between gap-2">
                                            <h1 className="text-xl font-bold tracking-tight text-white truncate">{tripName}</h1>
                                            <Icon name="edit-3" size={14} className="text-slate-400 group-hover:text-blue-400 flex-shrink-0" />
                                        </div>
                                        <p className="text-blue-400 text-[10px] font-bold uppercase tracking-widest mt-1">
                                            {tripDate ? formatDate(tripDate) : "Указать дату выезда"}
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* Кнопки управления данными (Резервные копии) */}
                            <div className="flex gap-2 bg-slate-800/30 p-2 rounded-xl border border-slate-800">
                                <button onClick={() => fileInputRef.current && fileInputRef.current.click()} title="Загрузить plan (.json)" className="flex-1 bg-slate-800 p-2.5 rounded-lg text-slate-300 hover:bg-blue-600 hover:text-white transition-all flex justify-center items-center gap-2 text-xs font-medium">
                                    <Icon name="upload" size={16} /> <span className="hidden md:inline">Импорт</span>
                                </button>
                                <button onClick={exportData} title="Сохранить план (.json)" className="flex-1 bg-slate-800 p-2.5 rounded-lg text-slate-300 hover:bg-green-600 hover:text-white transition-all flex justify-center items-center gap-2 text-xs font-medium">
                                    <Icon name="download" size={16} /> <span className="hidden md:inline">Бэкап</span>
                                </button>
                                <button onClick={clearAllData} title="Очистить всё" className="bg-slate-800 p-2.5 rounded-lg text-slate-500 hover:bg-red-600 hover:text-white transition-all flex justify-center items-center">
                                    <Icon name="trash" size={16} />
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={importData} />
                            </div>

                            {/* Меню навигации (Десктопная версия) */}
                            <nav className="hidden md:block space-y-2">
                                {navigationItems.map(item => (
                                    <button 
                                        key={item.id} 
                                        onClick={() => {setActiveTab(item.id); setIsModalOpen(false);}} 
                                        className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl transition-all text-sm font-semibold ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30 translate-x-1' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200'}`}
                                    >
                                        <Icon name={item.icon} size={20} strokeWidth={activeTab === item.id ? 2.5 : 2} />
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>

                        <div className="hidden md:block text-[10px] text-slate-500 font-medium border-t border-slate-800/60 pt-4">
                            Vacation Planner &bull; Modern Immersive
                        </div>
                    </div>

                    {/* Основной контент справа */}
                    <div className="flex-1 flex flex-col min-h-0 relative">
                        
                        <main className="flex-1 overflow-y-auto p-4 md:p-8 pb-32 md:pb-12 max-w-5xl w-full mx-auto no-scrollbar">
                            
                            {/* ТАБ: СТАРТ */}
                            {activeTab === 'home' && (
                                <div className="space-y-8 animate-in">
                                    {/* Главный виджет */}
                                    <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-950 rounded-[2.5rem] p-6 md:p-10 text-white shadow-xl relative overflow-hidden">
                                        <Icon name="plane" size={240} className="absolute -right-10 -top-10 text-white/5 rotate-12 pointer-events-none" />
                                        <div className="relative z-10 max-w-md">
                                            <p className="text-blue-300 text-[11px] uppercase tracking-widest mb-1 font-bold">Осталось до заветного отпуска</p>
                                            <div className="text-6xl md:text-7xl font-light mb-6 flex items-baseline gap-2">
                                                {getDaysLeft()}
                                                <span className="text-xl opacity-60 font-normal">дн.</span>
                                            </div>
                                            <div className="flex justify-between items-center mb-2 text-[10px] font-bold text-slate-300 tracking-wider">
                                                <span>ОБЩАЯ ГОТОВНОСТЬ ЗАДАЧ</span>
                                                <span className="text-blue-400 text-sm">{progress}%</span>
                                            </div>
                                            <div className="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                                                <div className="bg-blue-500 h-full transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                                        {/* Чек-лист перед выходом */}
                                        <div className="bg-rose-50/50 dark:bg-rose-950/20 p-6 rounded-[2.5rem] border border-rose-100/70 dark:border-rose-900/40 md:col-span-2">
                                            <div className="flex items-center gap-2 mb-4">
                                                <Icon name="zap" size={18} className="text-rose-500" />
                                                <h3 className="text-xs font-extrabold text-rose-800 dark:text-rose-400 uppercase tracking-widest">Финальный экспресс-осмотр перед выходом</h3>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                {lastMinute.map(item => (
                                                    <div 
                                                        key={item.id} 
                                                        onClick={() => setLastMinute(lastMinute.map(i => i.id === item.id ? {...i, checked: !i.checked} : i))}
                                                        className={`flex items-center gap-3 p-3.5 rounded-xl cursor-pointer transition-all ${item.checked ? 'bg-rose-100/40 dark:bg-rose-950/40 line-through opacity-50' : 'bg-white dark:bg-slate-900 shadow-sm hover:shadow-md border border-rose-200/40 dark:border-slate-800'}`}
                                                    >
                                                        <Icon name={item.checked ? "check-circle-2" : "circle"} size={16} className={item.checked ? "text-rose-500" : "text-rose-300 dark:text-rose-800"} />
                                                        <span className="text-xs font-semibold text-rose-900 dark:text-rose-200">{item.title}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Быстрые карточки аналитики */}
                                        <div className="grid grid-cols-2 md:grid-cols-1 gap-4 w-full">
                                            <div onClick={() => setActiveTab('tasks')} className="bg-white dark:bg-slate-900 p-5 rounded-[2rem] border border-slate-200/60 dark:border-slate-800 cursor-pointer shadow-sm active:scale-[0.98] transition-all hover:border-orange-200 hover:shadow-md">

                                                                        const name = newBudgetCatInModal.trim();
                                                                        if (name && !budgetCategories.includes(name)) {
                                                                            setBudgetCategories([...budgetCategories, name]);
                                                                            setNewBudgetCause(name);
                                                                        }
                                                                        setIsCreatingBudgetCatInModal(false);
                                                                        setNewBudgetCatInModal('');
                                                                    }
                                                                }}
                                                                onBlur={() => {
                                                                    setTimeout(() => {
                                                                        const name = newBudgetCatInModal.trim();
                                                                        if (name && !budgetCategories.includes(name)) {
                                                                            setBudgetCategories([...budgetCategories, name]);
                                                                            setNewBudgetCause(name);
                                                                        }
                                                                        setIsCreatingBudgetCatInModal(false);
                                                                        setNewBudgetCatInModal('');
                                                                    }, 200);
                                                                }}
                                                            />
                                                        </div>
                                                    ) : (
                                                        <button type="button" onClick={() => setIsCreatingBudgetCatInModal(true)} className="px-2 py-1.5 rounded-lg text-[10px] font-bold border border-dashed border-emerald-400 text-emerald-600 dark:text-emerald-400 flex items-center justify-center hover:bg-emerald-50 dark:hover:bg-slate-800" title="Добавить статью бюджета">
                                                            <Icon name="plus" size={12} strokeWidth={3} />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {activeTab === 'tasks' && (
                                        <div className="flex flex-wrap gap-1.5">
                                            {timePeriods.map(p => (
                                                <button key={p} type="button" onClick={() => setSelectedTime(p)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${selectedTime === p ? 'bg-slate-900 dark:bg-slate-100 dark:text-slate-900 border-slate-900 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900'}`}>{p}</button>
                                            ))}
                                        </div>
                                    )}
                                    
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold p-3.5 text-xs rounded-xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-all">Отмена</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-3.5 text-xs rounded-xl shadow-lg hover:bg-blue-700 transition-all">Добавить</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ (ОБНОВЛЕННОЕ С МУЛЬТИВАЛЮТНОСТЬЮ) */}
                    {}
                    {editingEntity && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setEditingEntity(null)}></div>
                            <div className="w-full max-w-md bg-white dark:bg-slate-900 rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative animate-in max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-lg font-bold mb-4 text-slate-900 dark:text-white">Редактирование</h2>
                                <form onSubmit={saveEditedEntity} className="space-y-4">
                                    <input 
                                        autoFocus 
                                        type="text" 
                                        value={editingEntity.type === 'packing' ? (editingEntity.data.item || '') : (editingEntity.data.title || '')} 
                                        onChange={e => {
                                            const val = e.target.value;
                                            setEditingEntity(prev => {
                                                if (!prev) return null;
                                                return {
                                                    ...prev,
                                                    data: { ...prev.data, [prev.type === 'packing' ? 'item' : 'title']: val }
                                                };
                                            });
                                        }} 
                                        className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-3.5 font-semibold text-sm text-slate-900 dark:text-white outline-none focus:ring-2 ring-blue-500/20 transition-all" 
                                        required
                                    />
                                    
                                    {/* Редактирование дела (Время) */}
                                    {editingEntity.type === 'tasks' && (
                                        <div className="flex flex-wrap gap-1.5">
                                            {timePeriods.map(p => (
                                                <button 
                                                    key={p} 
                                                    type="button" 
                                                    onClick={() => setEditingEntity(prev => {
                                                        if (!prev) return null;
                                                        return { ...prev, data: { ...prev.data, time: p } };
                                                    })} 
                                                    className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${editingEntity.data.time === p ? 'bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400'}`}
                                                >
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* Редактирование заметки */}
                                    {editingEntity.type === 'notes' && (
                                        <div className="space-y-4">
                                            <textarea 
                                                value={editingEntity.data.content || ''} 
                                                onChange={e => {
                                                    const val = e.target.value;
                                                    setEditingEntity(prev => {
                                                        if (!prev) return null;
                                                        return { ...prev, data: { ...prev.data, content: val } };
                                                    });
                                                }} 
                                                className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-3.5 text-xs font-medium h-28 outline-none no-scrollbar text-slate-900 dark:text-slate-100" 
                                            />
                                            <div className="flex flex-wrap gap-1.5">
                                                {noteCategories.map(cat => (
                                                    <button 
                                                        key={cat} 
                                                        type="button" 
                                                        onClick={() => setEditingEntity(prev => {
                                                            if (!prev) return null;
                                                            return { ...prev, data: { ...prev.data, category: cat } };
                                                        })} 
                                                        className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${editingEntity.data.category === cat ? 'bg-blue-600 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400'}`}
                                                    >
                                                        {cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Редактирование маршрута */}
                                    {editingEntity.type === 'itinerary' && (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="text-[10px] font-extrabold text-slate-400 uppercase mb-1 block">День</label>
                                                    <input 
                                                        type="text" 
                                                        value={editingEntity.data.day || ''} 
                                                        onChange={e => {
                                                            const val = e.target.value;
                                                            setEditingEntity(prev => {
                                                                if (!prev) return null;
                                                                return { ...prev, data: { ...prev.data, day: val } };
                                                            });
                                                        }} 
                                                        className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-2 text-xs font-bold text-slate-900 dark:text-white" 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-extrabold text-slate-400 uppercase mb-1 block">Время</label>
                                                    <input 
                                                        type="time" 
                                                        value={editingEntity.data.time || ''} 
                                                        onChange={e => {
                                                            const val = e.target.value;
                                                            setEditingEntity(prev => {
                                                                if (!prev) return null;
                                                                return { ...prev, data: { ...prev.data, time: val } };
                                                            });
                                                        }} 
                                                        className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-2 text-xs font-bold text-slate-900 dark:text-white" 
                                                    />
                                                </div>
                                            </div>
                                            <textarea 
                                                value={editingEntity.data.content || ''} 
                                                onChange={e => {
                                                    const val = e.target.value;
                                                    setEditingEntity(prev => {
                                                        if (!prev) return null;
                                                        return { ...prev, data: { ...prev.data, content: val } };
                                                    });
                                                }} 
                                                className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-3.5 text-xs font-medium h-24 outline-none no-scrollbar text-slate-900 dark:text-slate-100" 
                                            />
                                        </div>
                                    )}

                                    {/* Редактирование расходов с мультивалютностью */}
                                    {editingEntity.type === 'budget' && (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-3 gap-2">
                                                <div className="col-span-2">
                                                    <label className="text-[10px] font-extrabold text-slate-400 uppercase mb-1 block">Стоимость</label>
                                                    <input 
                                                        type="number" 
                                                        value={editingEntity.data.cost || 0} 
                                                        onChange={e => {
                                                            const val = e.target.value;
                                                            setEditingEntity(prev => {
                                                                if (!prev) return null;
                                                                return { ...prev, data: { ...prev.data, cost: val } };
                                                            });
                                                        }} 
                                                        className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-900 dark:text-white" 
                                                        required 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-extrabold text-slate-400 uppercase mb-1 block">Валюта</label>
                                                    <select 
                                                        value={editingEntity.data.currency || '₽'} 
                                                        onChange={e => {
                                                            const val = e.target.value;
                                                            setEditingEntity(prev => {
                                                                if (!prev) return null;
                                                                return { ...prev, data: { ...prev.data, currency: val } };
                                                            });
                                                        }} 
                                                        className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-xl p-3 text-sm font-bold text-slate-900 dark:text-white cursor-pointer"
                                                    >
                                                        <option value="₽">₽</option>
                                                        <option value="$">$</option>
                                                        <option value="€">€</option>
                                                        <option value="¥">¥</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5">
                                                {budgetCategories.map(cat => (
                                                    <button 
                                                        key={cat} 
                                                        type="button" 
                                                        onClick={() => setEditingEntity(prev => {
                                                            if (!prev) return null;
                                                            return { ...prev, data: { ...prev.data, category: cat } };
                                                        })} 
                                                        className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${editingEntity.data.category === cat ? 'bg-emerald-600 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400'}`}
                                                    >
                                                        {cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setEditingEntity(null)} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold p-3.5 text-xs rounded-xl hover:bg-slate-200 transition-all">Отмена</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-3.5 text-xs rounded-xl shadow-lg hover:bg-blue-700 transition-all">Сохранить</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* КАСТОМНЫЙ ДИАЛОГ И CONFIRM */}
                    {customDialog.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-sm" onClick={closeDialog}></div>
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 rounded-[2rem] p-6 shadow-2xl relative animate-in text-center">
                                <div className="mx-auto w-12 h-12 bg-indigo-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 mb-4">
                                    <Icon name="check-circle-2" size={24} />
                                </div>
                                <h3 className="text-base font-extrabold text-slate-900 dark:text-white mb-2">{customDialog.title}</h3>
                                <p className="text-xs text-slate-500 dark:text-slate-400 font-medium mb-6 leading-relaxed">{customDialog.message}</p>
                                
                                {customDialog.isConfirm ? (
                                    <div className="flex gap-2">
                                        <button onClick={closeDialog} className="flex-1 py-3 text-xs font-bold rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 transition-all">
                                            Отмена
                                        </button>
                                        <button onClick={customDialog.onConfirm} className="flex-1 py-3 text-xs font-bold rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-600/15 transition-all">
                                            Продолжить
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={closeDialog} className="w-full py-3 text-xs font-bold rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-600/15 transition-all">
                                        Отлично
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
