<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation Planner - Ultimate Multi-Trip Edition</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Подключаем зависимости -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Безопасное хранилище
        const safeStorage = {
            getItem: (key) => {
                try { return localStorage.getItem(key); } catch (e) { return null; }
            },
            setItem: (key, value) => {
                try { localStorage.setItem(key, value); } catch (e) { }
            }
        };

        // Высокопроизводительные SVG-иконки без внешних зависимостей
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const icons = {
                home: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                ),
                calendar: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                ),
                briefcase: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                ),
                'file-text': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                ),
                coins: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <circle cx="8" cy="8" r="6"/>
                        <circle cx="18" cy="18" r="4"/>
                        <path d="M12 18a6 6 0 0 0-6-6"/>
                    </svg>
                ),
                plus: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                ),
                trash: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                ),
                upload: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                ),
                download: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                ),
                plane: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.9-.2-1.9.2-2.4.9l-.6.9 7.7 4-3.7 3.7-3.2-.8c-.8-.2-1.6.2-1.8 1l-.2.7 4 2 2 4 .7-.2c.8-.2 1.2-1 1-1.8l-.8-3.2 3.7-3.7 4 7.7.9-.6c.7-.5 1.1-1.5.9-2.4z"/>
                    </svg>
                ),
                zap: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                ),
                'check-circle-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                        <polyline points="9 11 12 14 22 4"/>
                    </svg>
                ),
                circle: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} className={className} style={{ width: size, height: size }}>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                ),
                package: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                        <polyline points="2 17 12 22 22 17"/>
                        <polyline points="2 12 12 17 22 12"/>
                    </svg>
                ),
                'edit-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                    </svg>
                ),
                'edit-3': (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                ),
                chevronDown: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                ),
                chevronUp: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <polyline points="18 15 12 9 6 15"/>
                    </svg>
                ),
                x: (
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={{ width: size, height: size }}>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                )
            };
            return icons[name] || (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} className={className} style={{ width: size, height: size }}>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditingName, setIsEditingName] = useState(false);
            const fileInputRef = useRef(null);

            // Фиксированные категории вещей
            const packingCategories = ['Мои вещи', 'Вещи супруга', 'Детские', 'Аптечка', 'Разное'];
            const [activePackingCat, setActivePackingCat] = useState(packingCategories[0]);

            // --- КУРСЫ ВАЛЮТ (сохраняются) ---
            const [exchangeRates, setExchangeRates] = useState(() => {
                const saved = safeStorage.getItem('exchangeRates_v1');
                return saved ? JSON.parse(saved) : { USD: 92.5, EUR: 100.2, CNY: 12.8 };
            });
            const [isRatesExpanded, setIsRatesExpanded] = useState(false);

            // Валюта отображения общего итога
            const [displayCurrency, setDisplayCurrency] = useState(() => safeStorage.getItem('displayCurrency_v1') || 'RUB');

            // --- МУЛЬТИ-ПОЕЗДКИ ---
            const [trips, setTrips] = useState(() => {
                const saved = safeStorage.getItem('trips_list_v1');
                return saved ? JSON.parse(saved) : [
                    { id: 'trip-1', name: 'Лазурный берег', date: '2026-07-15' },
                    { id: 'trip-2', name: 'Горный поход', date: '2026-08-20' }
                ];
            });
            const [activeTripId, setActiveTripId] = useState(() => {
                const savedActive = safeStorage.getItem('activeTripId_v1');
                return savedActive || 'trip-1';
            });
            
            // Состояние формы создания новой поездки прямо на главном экране
            const [isAddingTrip, setIsAddingTrip] = useState(false);
            const [newTripNameInput, setNewTripNameInput] = useState('');
            const [newTripDateInput, setNewTripDateInput] = useState('');

            // Находим текущую активную поездку
            const activeTrip = trips.find(t => t.id === activeTripId) || trips[0] || { id: 'default', name: 'Моя поездка', date: '' };

            // Функция получения данных текущей поездки
            const getInitialData = (key, defaultValue) => {
                const saved = safeStorage.getItem(`${key}_${activeTripId}`);
                try { return saved ? JSON.parse(saved) : defaultValue; } catch (e) { return defaultValue; }
            };

            // --- ДАННЫЕ ТЕКУЩЕЙ ПОЕЗДКИ ---
            const [tasks, setTasks] = useState([]);
            const [packingList, setPackingList] = useState([]);
            const [notes, setNotes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [lastMinute, setLastMinute] = useState([]);

            // Шаблоны вещей (глобальные, доступны во всех поездках)
            const [packingTemplates, setPackingTemplates] = useState(() => {
                const saved = safeStorage.getItem('packingTemplates_v1');
                return saved ? JSON.parse(saved) : [
                    { name: 'Летний стандарт', items: ['Купальник / Плавки', 'Солнцезащитный крем', 'Очки', 'Шорты', 'Кепка'] },
                    { name: 'Горный экспресс', items: ['Ветровка', 'Треккинговая обувь', 'Термос', 'Фонарик', 'Дождевик'] },
                    { name: 'Дорожная аптечка', items: ['Пластырь', 'Обезболивающее', 'Антисептик', 'Активированный уголь'] }
                ];
            });
            const [newTemplateName, setNewTemplateName] = useState('');
            const [showTemplateModal, setShowTemplateModal] = useState(false);

            // --- МОДАЛЬНЫЕ ОКНА БЮДЖЕТА ---
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [editingExpenseId, setEditingExpenseId] = useState(null);
            const [expenseTitle, setExpenseTitle] = useState('');
            const [expenseAmount, setExpenseAmount] = useState('');
            const [expenseCurrency, setExpenseCurrency] = useState('RUB');
            const [expenseCategory, setExpenseCategory] = useState('Транспорт');

            // Синхронизация при смене поездки
            useEffect(() => {
                setTasks(getInitialData('tasks', [
                    { id: 1, title: 'Проверить сроки паспортов', time: 'За 30 дней', completed: true },
                    { id: 2, title: 'Забронировать трансфер', time: 'За 14 дней', completed: false }
                ]));
                setPackingList(getInitialData('packingList_v3', [
                    { id: 101, item: 'Купальник / Плавки', cat: 'Мои вещи', checked: false },
                    { id: 102, item: 'Солнцезащитные очки', cat: 'Вещи супруга', checked: true }
                ]));
                setNotes(getInitialData('notes_v2', [
                    { id: 901, title: 'Отель Riviera', content: 'ул. Набережная, 15. Код 1234', category: 'Адреса' }
                ]));
                setExpenses(getInitialData('expenses_v1', [
                    { id: 501, title: 'Авиабилеты', amount: 45000, currency: 'RUB', category: 'Транспорт' },
                    { id: 502, title: 'Отель у моря', amount: 600, currency: 'USD', category: 'Проживание' },
                    { id: 503, title: 'Ужин в ресторане', amount: 80, currency: 'EUR', category: 'Питание' }
                ]));
                setLastMinute(getInitialData('lastMinute', [
                    { id: 1, title: 'Утюг выключен', checked: false },
                    { id: 2, title: 'Окна закрыты', checked: false },
                    { id: 3, title: 'Вода перекрыта', checked: false },
                    { id: 4, title: 'Мусор вынесен', checked: false }
                ]));
            }, [activeTripId]);

            // Автосохранение при обновлении данных поездки
            useEffect(() => {
                if (activeTripId === 'default' || !activeTripId) return;
                safeStorage.setItem(`tasks_${activeTripId}`, JSON.stringify(tasks));
                safeStorage.setItem(`packingList_v3_${activeTripId}`, JSON.stringify(packingList));
                safeStorage.setItem(`notes_v2_${activeTripId}`, JSON.stringify(notes));
                safeStorage.setItem(`expenses_v1_${activeTripId}`, JSON.stringify(expenses));
                safeStorage.setItem(`lastMinute_${activeTripId}`, JSON.stringify(lastMinute));
            }, [tasks, packingList, notes, expenses, lastMinute, activeTripId]);

            // Автосохранение общих настроек
            useEffect(() => {
                safeStorage.setItem('trips_list_v1', JSON.stringify(trips));
                safeStorage.setItem('activeTripId_v1', activeTripId);
                safeStorage.setItem('exchangeRates_v1', JSON.stringify(exchangeRates));
                safeStorage.setItem('displayCurrency_v1', displayCurrency);
                safeStorage.setItem('packingTemplates_v1', JSON.stringify(packingTemplates));
            }, [trips, activeTripId, exchangeRates, displayCurrency, packingTemplates]);

            const timePeriods = ['В планах', 'За 30 дней', 'За 14 дней', 'За 7 дней', '24 часа'];
            const noteCategories = ['Адреса', 'Покупки', 'Места', 'Важное'];
            const expenseCategories = ['Транспорт', 'Проживание', 'Питание', 'Развлечения', 'Покупки', 'Другое'];

            // --- МУЛЬТИВАЛЮТНАЯ КОНВЕРТАЦИЯ ---
            const convertToRUB = (amount, currency) => {
                const val = parseFloat(amount) || 0;
                if (currency === 'RUB') return val;
                if (currency === 'USD') return val * (exchangeRates.USD || 92.5);
                if (currency === 'EUR') return val * (exchangeRates.EUR || 100.2);
                if (currency === 'CNY') return val * (exchangeRates.CNY || 12.8);
                return val;
            };

            const convertFromRUB = (amountInRUB, targetCurrency) => {
                if (targetCurrency === 'RUB') return amountInRUB;
                if (targetCurrency === 'USD') return amountInRUB / (exchangeRates.USD || 92.5);
                if (targetCurrency === 'EUR') return amountInRUB / (exchangeRates.EUR || 100.2);
                if (targetCurrency === 'CNY') return amountInRUB / (exchangeRates.CNY || 12.8);
                return amountInRUB;
            };

            const getCurrencySymbol = (currency) => {
                if (currency === 'RUB') return '₽';
                if (currency === 'USD') return '$';
                if (currency === 'EUR') return '€';
                if (currency === 'CNY') return '¥';
                return currency;
            };

            // Рассчет общих сумм бюджета
            const totalBudget = expenses.reduce((sum, item) => sum + convertToRUB(item.amount, item.currency), 0);
            const totalBudgetConverted = convertFromRUB(totalBudget, displayCurrency);

            const getDaysLeft = () => {
                if (!activeTrip.date) return 0; 
                const diff = new Date(activeTrip.date) - new Date();
                return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
            };

            // --- УПРАВЛЕНИЕ ПОЕЗДКАМИ ---
            const handleCreateTrip = (e) => {
                e.preventDefault();
                if (!newTripNameInput.trim()) return;
                const newId = `trip-${Date.now()}`;
                const newTrip = {
                    id: newId,
                    name: newTripNameInput.trim(),
                    date: newTripDateInput || new Date().toISOString().split('T')[0]
                };
                setTrips([...trips, newTrip]);
                setActiveTripId(newId);
                setNewTripNameInput('');
                setNewTripDateInput('');
                setIsAddingTrip(false);
            };

            const handleDeleteTrip = (idToDelete) => {
                if (trips.length <= 1) {
                    alert("Нельзя удалить единственную поездку!");
                    return;
                }
                if (confirm("Вы действительно хотите удалить эту поездку и все её данные?")) {
                    const filtered = trips.filter(t => t.id !== idToDelete);
                    setTrips(filtered);
                    if (activeTripId === idToDelete) {
                        setActiveTripId(filtered[0].id);
                    }
                    localStorage.removeItem(`tasks_${idToDelete}`);
                    localStorage.removeItem(`packingList_v3_${idToDelete}`);
                    localStorage.removeItem(`notes_v2_${idToDelete}`);
                    localStorage.removeItem(`expenses_v1_${idToDelete}`);
                    localStorage.removeItem(`lastMinute_${idToDelete}`);
                }
            };

            // --- ШАБЛОНЫ ВЕЩЕЙ ---
            const handleSavePackingAsTemplate = () => {
                const name = newTemplateName.trim();
                if (!name) return;
                const itemsToSave = packingList.filter(p => p.cat === activePackingCat).map(p => p.item);
                if (itemsToSave.length === 0) {
                    alert("В текущем списке нет вещей для сохранения в качестве шаблона.");
                    return;
                }
                if (packingTemplates.some(t => t.name.toLowerCase() === name.toLowerCase())) {
                    alert("Шаблон с таким именем уже существует!");
                    return;
                }
                setPackingTemplates([...packingTemplates, { name, items: itemsToSave }]);
                setNewTemplateName('');
                setShowTemplateModal(false);
                alert("🎉 Шаблон успешно сохранен и доступен во всех поездках!");
            };

            const handleApplyTemplate = (template) => {
                if (confirm(`Применить шаблон «${template.name}» в раздел «${activePackingCat}»?`)) {
                    const newItems = template.items.map((itemStr, index) => ({
                        id: Date.now() + index,
                        item: itemStr,
                        cat: activePackingCat,
                        checked: false
                    }));
                    setPackingList([...packingList, ...newItems]);
                }
            };

            const handleDeleteTemplate = (templateName) => {
                if (confirm(`Удалить шаблон «${templateName}»?`)) {
                    setPackingTemplates(packingTemplates.filter(t => t.name !== templateName));
                }
            };

            // --- БЮДЖЕТ: СОХРАНЕНИЕ / ИЗМЕНЕНИЕ ---
            const handleSaveExpense = (e) => {
                e.preventDefault();
                if (!expenseTitle.trim() || !expenseAmount) return;
                
                if (editingExpenseId) {
                    setExpenses(expenses.map(exp => exp.id === editingExpenseId ? {
                        ...exp,
                        title: expenseTitle.trim(),
                        amount: parseFloat(expenseAmount),
                        currency: expenseCurrency,
                        category: expenseCategory
                    } : exp));
                    setEditingExpenseId(null);
                } else {
                    const newExpense = {
                        id: Date.now(),
                        title: expenseTitle.trim(),
                        amount: parseFloat(expenseAmount),
                        currency: expenseCurrency,
                        category: expenseCategory
                    };
                    setExpenses([newExpense, ...expenses]);
                }
                setExpenseTitle('');
                setExpenseAmount('');
                setIsBudgetModalOpen(false);
            };

            const handleStartEditExpense = (exp) => {
                setEditingExpenseId(exp.id);
                setExpenseTitle(exp.title);
                setExpenseAmount(exp.amount);
                setExpenseCurrency(exp.currency);
                setExpenseCategory(exp.category);
                setIsBudgetModalOpen(true);
            };

            // Изменение названия текущей поездки
            const handleRenameTrip = (newName) => {
                if (!newName.trim()) return;
                setTrips(trips.map(t => t.id === activeTripId ? { ...t, name: newName.trim() } : t));
            };

            const handleUpdateTripDate = (newDate) => {

                                                    {item.checked ? <Icon name="check-circle-2" className="text-indigo-500" /> : <Icon name="circle" className="text-slate-200" />}
                                                </div>
                                                <button onClick={() => deleteItem('packing', item.id)} className="md:opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all p-1">
                                                    <Icon name="trash" size={14} />
                                                </button>
                                            </div>
                                        ))}

                                        {packingList.filter(p => p.cat === activePackingCat).length === 0 && (
                                            <div className="sm:col-span-2 p-12 border border-dashed border-slate-300 bg-white rounded-3xl text-sm text-slate-400 text-center font-medium">
                                                Раздел «{activePackingCat}» пока пуст.<br/>Нажмите кнопку «+» в углу экрана, чтобы добавить нужные вещи.
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'budget' && (
                                <div className="space-y-6 animate-in">
                                    
                                    {/* ПАНЕЛЬ НАСТРОЙКИ КУРСОВ ВАЛЮТ */}
                                    <div className="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-200/60">
                                        <button 
                                            onClick={() => setIsRatesExpanded(!isRatesExpanded)}
                                            className="w-full flex items-center justify-between text-slate-700 font-bold text-xs uppercase tracking-wider"
                                        >
                                            <span className="flex items-center gap-2">
                                                <Icon name="coins" size={16} className="text-indigo-500" />
                                                Настройка курсов валют (в ₽)
                                            </span>
                                            <Icon name={isRatesExpanded ? 'chevronUp' : 'chevronDown'} size={14} />
                                        </button>

                                        {isRatesExpanded && (
                                            <div className="grid grid-cols-3 gap-3 pt-4 mt-3 border-t border-slate-100 animate-in">
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">USD ($)</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.1"
                                                        className="w-full bg-slate-50 border p-2.5 rounded-xl text-xs font-bold outline-none"
                                                        value={exchangeRates.USD}
                                                        onChange={e => setExchangeRates({ ...exchangeRates, USD: parseFloat(e.target.value) || 0 })}
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">EUR (€)</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.1"
                                                        className="w-full bg-slate-50 border p-2.5 rounded-xl text-xs font-bold outline-none"
                                                        value={exchangeRates.EUR}
                                                        onChange={e => setExchangeRates({ ...exchangeRates, EUR: parseFloat(e.target.value) || 0 })}
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">CNY (¥)</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.1"
                                                        className="w-full bg-slate-50 border p-2.5 rounded-xl text-xs font-bold outline-none"
                                                        value={exchangeRates.CNY}
                                                        onChange={e => setExchangeRates({ ...exchangeRates, CNY: parseFloat(e.target.value) || 0 })}
                                                    />
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* ИТОГОВАЯ ПАНЕЛЬ С КОНВЕРТАЦИЕЙ И АНАЛИТИКОЙ */}
                                    <div className="bg-slate-900 text-white rounded-[2rem] p-6 shadow-md space-y-6">
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                            <div>
                                                <p className="text-[10px] text-slate-400 uppercase font-extrabold tracking-wider mb-1">Общие расходы на поездку</p>
                                                <h3 className="text-4xl font-light">
                                                    {Math.round(totalBudgetConverted).toLocaleString()}{' '}
                                                    <span className="text-xl font-normal text-blue-400">{getCurrencySymbol(displayCurrency)}</span>
                                                </h3>
                                            </div>
                                            {/* Выбор валюты просмотра общего итога */}
                                            <div className="flex bg-slate-800 p-1.5 rounded-xl border border-slate-700 w-fit self-start sm:self-auto">
                                                {['RUB', 'USD', 'EUR', 'CNY'].map(cur => (
                                                    <button 
                                                        key={cur}
                                                        onClick={() => setDisplayCurrency(cur)}
                                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${displayCurrency === cur ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}
                                                    >
                                                        {getCurrencySymbol(cur)}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Аналитика по категориям расходов */}
                                        <div className="border-t border-slate-800 pt-5 space-y-3">
                                            <h4 className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Категории затрат</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                {expenseCategories.map(cat => {
                                                    const catTotalRUB = expenses.filter(e => e.category === cat).reduce((sum, item) => sum + convertToRUB(item.amount, item.currency), 0);
                                                    const catTotalConverted = convertFromRUB(catTotalRUB, displayCurrency);
                                                    const pct = totalBudget ? Math.round((catTotalRUB / totalBudget) * 100) : 0;
                                                    
                                                    if (catTotalRUB === 0) return null;

                                                    return (
                                                        <div key={cat} className="bg-slate-800/40 border border-slate-800 p-3.5 rounded-xl">
                                                            <div className="flex justify-between items-center text-xs font-bold mb-1.5">
                                                                <span className="text-slate-300">{cat}</span>
                                                                <span className="text-white">{Math.round(catTotalConverted).toLocaleString()} {getCurrencySymbol(displayCurrency)} ({pct}%)</span>
                                                            </div>
                                                            <div className="w-full bg-slate-800 rounded-full h-1">
                                                                <div className="bg-blue-400 h-1 rounded-full" style={{ width: `${pct}%` }}></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    {/* СПИСОК РАСХОДОВ */}
                                    <div className="space-y-3">
                                        <div className="flex items-center justify-between px-1">
                                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Детализация платежей</h3>
                                            <button 
                                                onClick={() => {
                                                    setEditingExpenseId(null);
                                                    setExpenseTitle('');
                                                    setExpenseAmount('');
                                                    setExpenseCurrency('RUB');
                                                    setExpenseCategory('Транспорт');
                                                    setIsBudgetModalOpen(true);
                                                }}
                                                className="bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5"
                                            >
                                                <Icon name="plus" size={12} strokeWidth={3} />
                                                <span>Добавить расход</span>
                                            </button>
                                        </div>

                                        <div className="space-y-2">
                                            {expenses.map(exp => {
                                                const convertedVal = convertFromRUB(convertToRUB(exp.amount, exp.currency), displayCurrency);
                                                const isDifferentCurrency = exp.currency !== displayCurrency;

                                                return (
                                                    <div key={exp.id} className="group bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm flex items-center justify-between hover:border-blue-100 transition-all">
                                                        <div className="flex-1 min-w-0 pr-4">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-[9px] bg-slate-100 text-slate-500 font-bold px-2 py-0.5 rounded uppercase">{exp.category}</span>
                                                            </div>
                                                            <h4 className="font-bold text-xs text-slate-800 mt-1 truncate">{exp.title}</h4>
                                                        </div>
                                                        <div className="text-right flex-shrink-0 flex items-center gap-3">
                                                            <div>
                                                                <div className="font-extrabold text-sm text-slate-900">
                                                                    {exp.amount} {getCurrencySymbol(exp.currency)}
                                                                </div>
                                                                {/* Умная подсказка примерной конвертации */}
                                                                {isDifferentCurrency && (
                                                                    <div className="text-[10px] text-indigo-500 font-bold mt-0.5">
                                                                        &asymp; {Math.round(convertedVal).toLocaleString()} {getCurrencySymbol(displayCurrency)}
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-1.5">
                                                                <button onClick={() => handleStartEditExpense(exp)} className="p-1 text-slate-300 hover:text-blue-500">
                                                                    <Icon name="edit-2" size={13} />
                                                                </button>
                                                                <button onClick={() => setExpenses(expenses.filter(e => e.id !== exp.id))} className="p-1 text-slate-300 hover:text-red-500">
                                                                    <Icon name="trash" size={13} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {expenses.length === 0 && (
                                                <div className="text-center py-12 text-slate-400 text-xs bg-white rounded-3xl border">Здесь будут записаны расходы. Нажмите «Добавить расход» выше.</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'notes' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                    {noteCategories.map(cat => {
                                        const catNotes = notes.filter(n => n.category === cat);
                                        return (
                                            <div key={cat} className="bg-white p-5 rounded-[2rem] border border-slate-200/60 shadow-sm space-y-3">
                                                <h3 className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest pb-2 border-b border-slate-50">{cat}</h3>
                                                <div className="space-y-3">
                                                    {catNotes.map(note => (
                                                        <div key={note.id} className="bg-slate-50 rounded-xl p-4 group relative border border-transparent hover:border-blue-100 hover:bg-white transition-all">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <h4 className="font-bold text-xs text-slate-800 tracking-tight">{note.title}</h4>
                                                                <button onClick={() => deleteItem('notes', note.id)} className="text-slate-300 hover:text-red-500 transition-all">
                                                                    <Icon name="x" size={14}/>
                                                                </button>
                                                            </div>
                                                            <p className="text-xs text-slate-500 leading-relaxed whitespace-pre-wrap font-medium">{note.content}</p>
                                                        </div>
                                                    ))}
                                                    {catNotes.length === 0 && <div className="p-4 text-[10px] text-slate-300 text-center uppercase font-bold tracking-widest">Нет записей</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </main>

                        {/* Плавающая кнопка "+" */}
                        {['tasks', 'packing', 'notes'].includes(activeTab) && (
                            <button onClick={() => setIsModalOpen(true)} className="fixed bottom-24 right-6 md:bottom-8 md:right-8 bg-blue-600 text-white w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center active:scale-95 hover:scale-105 transition-all z-40 hover:bg-blue-700">
                                <Icon name="plus" size={26} />
                            </button>
                        )}

                        {/* Мобильный таб-бар снизу */}
                        <div className="md:hidden fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 h-20 flex justify-around items-center px-2 z-30 pb-2">
                            {navigationItems.map(item => (
                                <button key={item.id} onClick={() => {setActiveTab(item.id); setIsModalOpen(false);}} className={`flex flex-col items-center gap-1 transition-all px-3 ${activeTab === item.id ? 'text-blue-600 scale-105' : 'text-slate-400'}`}>
                                    <Icon name={item.icon} size={18} />
                                    <span className="text-[9px] font-bold uppercase">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Модальное окно создания/редактирования задач и заметок */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="w-full max-w-md bg-white rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative animate-in max-h-[90vh] overflow-y-auto">
                                <h2 className="text-lg font-bold mb-4 text-slate-900">
                                    {activeTab === 'tasks' ? "Новое дело" : activeTab === 'notes' ? "Новая заметка" : `Добавить в «${activePackingCat}»`}
                                </h2>
                                <form onSubmit={handleAddItem} className="space-y-4">
                                    <input autoFocus type="text" value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder={activeTab === 'packing' ? "Например: Купальник, SPF-крем..." : "Заголовок..."} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3.5 font-semibold text-sm text-slate-900 outline-none focus:ring-2 ring-blue-500/20 transition-all" />
                                    
                                    {activeTab === 'notes' && (
                                        <div className="space-y-4">
                                            <textarea value={newItemContent} onChange={e => setNewItemContent(e.target.value)} placeholder="Описание / детали / полезные ссылки..." className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3.5 text-xs font-medium h-28 outline-none no-scrollbar" />
                                            <div className="flex flex-wrap gap-1.5">
                                                {noteCategories.map(cat => (
                                                    <button key={cat} type="button" onClick={() => setSelectedCategory(cat)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${selectedCategory === cat ? 'bg-blue-600 border-blue-600 text-white shadow' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}>{cat}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {activeTab === 'tasks' && (
                                        <div className="flex flex-wrap gap-1.5">
                                            {timePeriods.map(p => (
                                                <button key={p} type="button" onClick={() => setSelectedTime(p)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${selectedTime === p ? 'bg-slate-900 border-slate-900 text-white shadow' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}>{p}</button>
                                            ))}
                                        </div>
                                    )}
                                    
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-500 font-bold p-3.5 text-xs rounded-xl hover:bg-slate-200 transition-all">Отмена</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-3.5 text-xs rounded-xl hover:bg-blue-700 transition-all">Добавить</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Модальное окно бюджетов */}
                    {isBudgetModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsBudgetModalOpen(false)}></div>
                            <div className="w-full max-w-md bg-white rounded-[2.5rem] p-6 shadow-2xl relative animate-in max-h-[90vh] overflow-y-auto">
                                <h2 className="text-lg font-bold mb-4 text-slate-900">
                                    {editingExpenseId ? "Редактировать расход" : "Добавить новый расход"}
                                </h2>
                                <form onSubmit={handleSaveExpense} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">Что оплачено / куплено</label>
                                        <input 
                                            autoFocus 
                                            type="text" 
                                            value={expenseTitle} 
                                            onChange={e => setExpenseTitle(e.target.value)} 
                                            placeholder="Например: Аренда авто, билеты в музей..." 
                                            className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3.5 font-semibold text-sm outline-none focus:ring-2 ring-blue-500/20" 
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">Стоимость / Сумма</label>
                                            <input 
                                                type="number" 
                                                step="0.01"
                                                value={expenseAmount} 
                                                onChange={e => setExpenseAmount(e.target.value)} 
                                                placeholder="Сумма" 
                                                className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3.5 font-semibold text-sm outline-none focus:ring-2" 
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] text-slate-400 font-bold uppercase mb-1">Индивидуальная валюта</label>
                                            <select 
                                                className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3.5 font-semibold text-sm outline-none cursor-pointer focus:ring-2"
                                                value={expenseCurrency}
                                                onChange={e => setExpenseCurrency(e.target.value)}
                                            >
                                                <option value="RUB">RUB (₽)</option>
                                                <option value="USD">USD ($)</option>
                                                <option value="EUR">EUR (€)</option>
                                                <option value="CNY">CNY (¥)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-[10px] text-slate-400 font-bold uppercase mb-2">Категория операции</label>
                                        <div className="flex flex-wrap gap-1.5">
                                            {expenseCategories.map(cat => (
                                                <button 
                                                    key={cat} 
                                                    type="button" 
                                                    onClick={() => setExpenseCategory(cat)} 
                                                    className={`px-3.5 py-2 rounded-lg text-xs font-bold border transition-all ${expenseCategory === cat ? 'bg-blue-600 border-blue-600 text-white shadow' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}
                                                >
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsBudgetModalOpen(false)} className="flex-1 bg-slate-100 text-slate-500 font-bold p-3.5 text-xs rounded-xl">Отмена</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-3.5 text-xs rounded-xl hover:bg-blue-700">Сохранить</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
