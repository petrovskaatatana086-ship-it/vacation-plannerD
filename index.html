<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vacation Planner - Ultimate Organizer (Мульти-поездки + Шаблоны)</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { transition: background-color 0.3s, color 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ----- Хранилище -----
        const storage = {
            get: (key, def) => {
                try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
            },
            set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
        };

        // ----- Глобальные константы -----
        const DEFAULT_PACKING_CATS = ['Мои вещи', 'Аптечка', 'Документы', 'Техника', 'Разное'];
        const DEFAULT_NOTE_CATS = ['Адреса', 'Покупки', 'Локации', 'Важное'];
        const DEFAULT_BUDGET_CATS = ['Транспорт', 'Жилье', 'Развлечения', 'Питание', 'Другое'];
        const DEFAULT_RATES = { '₽': 1, '$': 90, '€': 98, '¥': 12.5 };
        const TIME_PRESETS = ['В планах', 'За 30 дней', 'За 14 дней', 'За 7 дней', '24 часа'];

        // ----- Набор SVG Иконок -----
        const Icon = ({ name, size = 20, className = "" }) => {
            const svgProps = { className, width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
            const paths = {
                home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                briefcase: <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
                'file-text': <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                'check-circle': <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                circle: <><circle cx="12" cy="12" r="10"/></>,
                sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></>,
                moon: <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                zap: <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                mapPin: <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
                dollar: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>
            };
            return <svg {...svgProps}>{paths[name] || paths.circle}</svg>;
        };

        // ----- Создание пустой поездки -----
        const createTrip = (name, date = '') => ({
            id: Date.now() + Math.random(),
            name: name || 'Новое путешествие',
            date: date,
            tasks: [
                { id: 1, title: 'Проверить сроки действия паспортов', time: 'За 30 дней', completed: false, customDays: null },
                { id: 2, title: 'Оформить туристическую страховку', time: 'За 14 дней', completed: false, customDays: null },
                { id: 3, title: 'Загрузить офлайн-карты местности', time: 'За 7 дней', completed: false, customDays: null },
                { id: 4, title: 'Зарядить повербанк и гаджеты', time: '24 часа', completed: false, customDays: null }
            ],
            packingList: [
                { id: 101, item: 'Загранпаспорт и копии документов', cat: 'Документы', checked: false },
                { id: 102, item: 'Аптечка (обезболивающее, пластыри)', cat: 'Аптечка', checked: false },
                { id: 103, item: 'Зарядные устройства и адаптеры', cat: 'Техника', checked: false }
            ],
            notes: [
                { id: 201, title: 'Полезные контакты', content: 'Отель Ресепшн: +7 (999) 123-45-67. Страховая служба: 8 (800) 555-35-35.', category: 'Важное' }
            ],
            itinerary: [
                { id: 401, day: 'День 1', time: '09:00', title: 'Вылет и прибытие', content: 'Встреча в аэропорту, трансфер в отель, заселение.' },
                { id: 402, day: 'День 1', time: '18:00', title: 'Приветственный ужин', content: 'Прогулка по центру города и ужин в уютном ресторанчике.' }
            ],
            budget: [
                { id: 301, title: 'Авиабилеты', cost: 35000, currency: '₽', category: 'Транспорт' },
                { id: 302, title: 'Бронь отеля (3 ночи)', cost: 15000, currency: '₽', category: 'Жилье' }
            ],
            lastMinute: [
                { id: 1, title: 'Утюг выключен', checked: false },
                { id: 2, title: 'Окна закрыты', checked: false },
                { id: 3, title: 'Вода перекрыта', checked: false },
                { id: 4, title: 'Мусор вынесен', checked: false }
            ],
            // Локальное UI состояние для поездки
            activePackingCat: 'Документы',
            selectedNoteCategory: 'Важное',
            newBudgetCause: 'Транспорт'
        });

        const App = () => {
            // Глобальные настройки
            const [darkMode, setDarkMode] = useState(() => storage.get('theme', false));
            const [displayCurrency, setDisplayCurrency] = useState(() => storage.get('displayCurrency', '₽'));
            const [exchangeRates, setExchangeRates] = useState(() => storage.get('exchangeRates', DEFAULT_RATES));
            const [packingCategories, setPackingCategories] = useState(() => storage.get('packingCats', DEFAULT_PACKING_CATS));
            const [noteCategories, setNoteCategories] = useState(() => storage.get('noteCats', DEFAULT_NOTE_CATS));
            const [budgetCategories, setBudgetCategories] = useState(() => storage.get('budgetCats', DEFAULT_BUDGET_CATS));
            const [packingTemplates, setPackingTemplates] = useState(() => storage.get('packingTemplates', []));

            // Кастомные системные уведомления / диалоги
            const [customAlert, setCustomAlert] = useState(null); // { message, title, type }
            const [customConfirm, setCustomConfirm] = useState(null); // { message, title, onConfirm, onCancel }

            // Поездки
            const [trips, setTrips] = useState(() => {
                const saved = storage.get('trips', null);
                if (saved && saved.length) return saved;
                
                // Начальное демо-путешествие
                const demo = createTrip('Лазурный Берег', '2026-07-15');
                return [demo];
            });

            const [currentTripId, setCurrentTripId] = useState(() => {
                const saved = storage.get('currentTripId', null);
                if (saved && trips.some(t => t.id === saved)) return saved;
                return trips[0]?.id;
            });

            const currentTrip = useMemo(() => {
                return trips.find(t => t.id === currentTripId) || trips[0];
            }, [trips, currentTripId]);

            // Синхронизация с LocalStorage
            useEffect(() => { storage.set('trips', trips); }, [trips]);
            useEffect(() => { if (currentTripId) storage.set('currentTripId', currentTripId); }, [currentTripId]);
            useEffect(() => { storage.set('theme', darkMode); document.documentElement.classList.toggle('dark', darkMode); }, [darkMode]);
            useEffect(() => { storage.set('displayCurrency', displayCurrency); storage.set('exchangeRates', exchangeRates); }, [displayCurrency, exchangeRates]);
            useEffect(() => { storage.set('packingCats', packingCategories); storage.set('noteCats', noteCategories); storage.set('budgetCats', budgetCategories); }, [packingCategories, noteCategories, budgetCategories]);
            useEffect(() => { storage.set('packingTemplates', packingTemplates); }, [packingTemplates]);

            // Кастомные триггеры диалогов вместо стандартных alert/confirm
            const showAlert = (message, title = "Информация", type = "info") => {
                setCustomAlert({ message, title, type });
            };

            const showConfirm = (message, title = "Подтверждение", onConfirm) => {
                setCustomConfirm({ message, title, onConfirm });
            };

            // Обновление полей текущей поездки
            const updateTrip = (updater) => {
                setTrips(prev => prev.map(t => t.id === currentTripId ? updater(t) : t));
            };
            const getField = (field) => currentTrip?.[field] || [];
            const setField = (field, value) => updateTrip(t => ({ ...t, [field]: value }));

            // Конвертация валют
            const convert = (amount, from, to) => {
                const val = Number(amount) || 0;
                if (from === to) return val;
                const inRub = val * (exchangeRates[from] || 1);
                return inRub / (exchangeRates[to] || 1);
            };

            // Общая стоимость бюджета
            const totalBudgetCost = useMemo(() => {
                const budgetList = getField('budget');
                return budgetList.reduce((sum, item) => {
                    return sum + convert(item.cost, item.currency, displayCurrency);
                }, 0);
            }, [currentTrip, displayCurrency, exchangeRates]);

            // Статистика по таскам
            const tasksList = getField('tasks');
            const progress = useMemo(() => {
                return tasksList.length ? Math.round((tasksList.filter(t => t.completed).length / tasksList.length) * 100) : 0;
            }, [tasksList]);

            const daysLeft = useMemo(() => {
                if (!currentTrip?.date) return '—';
                const difference = new Date(currentTrip.date) - new Date();
                return Math.max(0, Math.ceil(difference / (1000 * 3600 * 24)));
            }, [currentTrip?.date]);

            // Управление поездками
            const addTrip = (name, copyFromCurrent = false) => {
                let newTrip;
                if (copyFromCurrent && currentTrip) {
                    newTrip = createTrip(name || `Копия ${currentTrip.name}`, currentTrip.date);
                    newTrip.tasks = JSON.parse(JSON.stringify(currentTrip.tasks));
                    newTrip.packingList = JSON.parse(JSON.stringify(currentTrip.packingList));
                    newTrip.notes = JSON.parse(JSON.stringify(currentTrip.notes));
                    newTrip.itinerary = JSON.parse(JSON.stringify(currentTrip.itinerary));
                    newTrip.budget = JSON.parse(JSON.stringify(currentTrip.budget));
                    newTrip.lastMinute = JSON.parse(JSON.stringify(currentTrip.lastMinute));
                } else {
                    newTrip = createTrip(name || `Поездка ${trips.length + 1}`, '');
                }
                setTrips([...trips, newTrip]);
                setCurrentTripId(newTrip.id);
                showAlert(`Поездка "${newTrip.name}" успешно создана!`, 'Успех', 'success');
            };

            const deleteTrip = (id) => {
                if (trips.length <= 1) {
                    showAlert('Невозможно удалить последнюю поездку. Создайте сначала другую.', 'Ошибка', 'error');
                    return;
                }
                const targetTrip = trips.find(t => t.id === id);
                showConfirm(`Вы уверены, что хотите удалить поездку "${targetTrip?.name || ''}"? Все данные будут стерты навсегда!`, 'Внимание', () => {
                    const nextTrips = trips.filter(t => t.id !== id);
                    setTrips(nextTrips);
                    if (currentTripId === id) {
                        setCurrentTripId(nextTrips[0].id);
                    }
                });
            };

            // Сохранение текущего списка вещей как нового шаблона
            const saveAsTemplate = (name) => {
                if (!name.trim()) {
                    showAlert('Введите корректное имя шаблона.', 'Ошибка', 'error');
                    return;
                }
                const newTemplate = { id: Date.now(), name, items: JSON.parse(JSON.stringify(getField('packingList'))) };
                setPackingTemplates([...packingTemplates, newTemplate]);
                showAlert(`Шаблон "${name}" сохранен.`, 'Отлично', 'success');
            };

            const applyTemplate = (templateId) => {
                const tpl = packingTemplates.find(t => t.id === templateId);
                if (tpl) {
                    showConfirm(`Применить "${tpl.name}"? Текущий список вещей в этой категории будет заменен на шаблонный.`, 'Подтверждение', () => {
                        setField('packingList', JSON.parse(JSON.stringify(tpl.items)));
                        showAlert(`Шаблон "${tpl.name}" успешно применен!`, 'Выполнено', 'success');
                    });
                }
            };

            const deleteTemplate = (templateId) => {
                showConfirm('Вы действительно хотите удалить этот шаблон списка вещей?', 'Удаление шаблона', () => {
                    setPackingTemplates(prev => prev.filter(t => t.id !== templateId));
                });
            };

            // Состояния модалок и форм
            const [activeMainTab, setActiveMainTab] = useState('home');
            const [infoSubTab, setInfoSubTab] = useState('notes');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalType, setModalType] = useState('tasks');
            const [newItemName, setNewItemName] = useState('');
            const [newItemDetails, setNewItemDetails] = useState('');
            const [customDays, setCustomDays] = useState('');
            const [selectedTimePreset, setSelectedTimePreset] = useState('В планах');
            const [packingCat, setPackingCat] = useState(DEFAULT_PACKING_CATS[0]);
            const [noteCategory, setNoteCategory] = useState(DEFAULT_NOTE_CATS[0]);
            const [itineraryDay, setItineraryDay] = useState('День 1');
            const [itineraryTime, setItineraryTime] = useState('12:00');
            const [budgetCost, setBudgetCost] = useState('');
            const [budgetCurrency, setBudgetCurrency] = useState('₽');
            const [budgetCat, setBudgetCat] = useState(DEFAULT_BUDGET_CATS[0]);
            const [showTripManager, setShowTripManager] = useState(false);
            const [newTripNameInput, setNewTripNameInput] = useState('');
            const [newTemplateName, setNewTemplateName] = useState('');
            const [showTemplateModal, setShowTemplateModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            // Управление курсами валют и категориями в настройках
            const handleRateChange = (curr, val) => {
                setExchangeRates(prev => ({ ...prev, [curr]: parseFloat(val) || 0 }));
            };

            const addCategory = (type, value) => {
                if (!value.trim()) return;
                if (type === 'packing') {
                    if (!packingCategories.includes(value)) setPackingCategories([...packingCategories, value]);
                } else if (type === 'notes') {
                    if (!noteCategories.includes(value)) setNoteCategories([...noteCategories, value]);
                } else if (type === 'budget') {
                    if (!budgetCategories.includes(value)) setBudgetCategories([...budgetCategories, value]);
                }
            };

            const deleteCategory = (type, value) => {
                showConfirm(`Вы действительно хотите удалить категорию "${value}"? Это не удалит сами элементы, но они скроются из фильтров.`, 'Подтверждение', () => {
                    if (type === 'packing') setPackingCategories(prev => prev.filter(c => c !== value));
                    if (type === 'notes') setNoteCategories(prev => prev.filter(c => c !== value));
                    if (type === 'budget') setBudgetCategories(prev => prev.filter(c => c !== value));
                });
            };

            const openModal = (type) => {
                setModalType(type);
                setNewItemName('');
                setNewItemDetails('');
                setCustomDays('');
                setSelectedTimePreset('В планах');
                setPackingCat(currentTrip?.activePackingCat || packingCategories[0]);
                setNoteCategory(currentTrip?.selectedNoteCategory || noteCategories[0]);
                setItineraryDay('День 1');
                setItineraryTime('12:00');
                setBudgetCost('');
                setBudgetCurrency(displayCurrency);
                setBudgetCat(currentTrip?.newBudgetCause || budgetCategories[0]);
                setIsModalOpen(true);
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newItemName.trim()) return;
                const id = Date.now();
                if (modalType === 'tasks') {
                    let deadline = selectedTimePreset;
                    if (customDays && parseInt(customDays) > 0) deadline = `${parseInt(customDays)} дн.`;
                    const newTask = { id, title: newItemName, time: deadline, completed: false, customDays: customDays || null };
                    setField('tasks', [newTask, ...getField('tasks')]);
                } else if (modalType === 'packing') {
                    const newItem = { id, item: newItemName, cat: packingCat, checked: false };
                    setField('packingList', [newItem, ...getField('packingList')]);
                    updateTrip(t => ({ ...t, activePackingCat: packingCat }));
                } else if (modalType === 'notes') {
                    const newNote = { id, title: newItemName, content: newItemDetails, category: noteCategory };
                    setField('notes', [newNote, ...getField('notes')]);
                    updateTrip(t => ({ ...t, selectedNoteCategory: noteCategory }));
                } else if (modalType === 'itinerary') {
                    const newItin = { id, day: itineraryDay, time: itineraryTime, title: newItemName, content: newItemDetails };
                    // Сортировка по времени после добавления
                    const list = [...getField('itinerary'), newItin].sort((a, b) => a.time.localeCompare(b.time));
                    setField('itinerary', list);
                } else if (modalType === 'budget') {
                    const costNum = parseFloat(budgetCost) || 0;
                    const newBudget = { id, title: newItemName, cost: costNum, currency: budgetCurrency, category: budgetCat };
                    setField('budget', [newBudget, ...getField('budget')]);
                    updateTrip(t => ({ ...t, newBudgetCause: budgetCat }));
                }
                setIsModalOpen(false);
            };

            const deleteItem = (type, id) => {
                setField(type, getField(type).filter(i => i.id !== id));
            };

            const toggleTaskComplete = (taskId) => {
                setField('tasks', getField('tasks').map(t => t.id === taskId ? { ...t, completed: !t.completed } : t));
            };

            const togglePackingCheck = (itemId) => {
                setField('packingList', getField('packingList').map(p => p.id === itemId ? { ...p, checked: !p.checked } : p));
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans">
                    
                    {/* ----- CUSTOM DIALOGS FOR ALERT & CONFIRM ----- */}
                    {customAlert && (
                        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl animate-in">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className={`p-2 rounded-xl ${customAlert.type === 'error' ? 'bg-rose-100 text-rose-600 dark:bg-rose-950/50' : 'bg-emerald-100 text-emerald-600 dark:bg-emerald-950/50'}`}>
                                        <Icon name="info" size={24} />
                                    </div>
                                    <h3 className="font-bold text-lg">{customAlert.title}</h3>
                                </div>
                                <p className="text-slate-600 dark:text-slate-300 mb-6 text-sm leading-relaxed">{customAlert.message}</p>
                                <button onClick={() => setCustomAlert(null)} className="w-full bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 py-2.5 rounded-xl font-semibold hover:opacity-90 active:scale-95 transition-all text-sm">
                                    Понятно
                                </button>
                            </div>
                        </div>
                    )}

                    {customConfirm && (
                        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">

                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Отрисовка приложения
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
